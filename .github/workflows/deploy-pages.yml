# Publicerar sajten genom att spegla main till gh-pages-branchen,
# som GitHub Pages serverar (klassisk branch-deploy — kräver ingen
# Pages-API-behörighet för GITHUB_TOKEN).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Spegla main till gh-pages
        run: git push --force origin HEAD:gh-pages
